---
name: Build container image

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]
    paths-ignore:
      - "**/README.md"

  workflow_dispatch:

env:
  IMAGE_NAME: interlace
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  DEFAULT_TAG: latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_push:
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - variant: ""
            base_image: ghcr.io/ublue-os/bazzite-gnome:stable

          - variant: nvidia
            base_image: ghcr.io/ublue-os/bazzite-gnome-nvidia:stable

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize env
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          image: ${{ env.IMAGE_NAME }}${{ matrix.variant && format('-%s', matrix.variant) || '' }}
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
          oci: false

      - name: Push Image
        if: github.event_name != 'pull_request'
        id: push
        uses: redhat-actions/push-to-registry@v2
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}${{ matrix.variant && format('-%s', matrix.variant) || '' }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.0
        with:
          cosign-release: v2.6.3

      - name: Sign Image (FIXED)
        if: github.event_name != 'pull_request'
        run: |
          IMAGE="${IMAGE_REGISTRY}/${IMAGE_NAME}${VARIANT}"

          echo "Signing: ${IMAGE}"

          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            "${IMAGE}@${DIGEST}"
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          IMAGE_REGISTRY: ${{ env.IMAGE_REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VARIANT: ${{ matrix.variant && format('-%s', matrix.variant) || '' }}
          DIGEST: ${{ steps.push.outputs.digest }}

